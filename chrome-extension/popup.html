<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GPTeam</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="panel">
      <header class="header">
        <div>
          <div class="title">GPTeam v5.3.1</div>
          <div class="subtitle">只读面板</div>
        </div>
        <button id="open-members" class="open-members" type="button">打开 Members</button>
      </header>
      <section class="stats">
        <div class="stat">
          <div class="value" id="stat-total">0</div>
          <div class="label">总邮箱</div>
        </div>
        <div class="stat">
          <div class="value" id="stat-chatgpt">0</div>
          <div class="label">ChatGPT 席位</div>
        </div>
        <div class="stat">
          <div class="value" id="stat-today">0</div>
          <div class="label">今日已用</div>
        </div>
      </section>
      <input id="search" class="search" type="search" placeholder="搜索邮箱或备注">
      <main id="list" class="list"></main>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
